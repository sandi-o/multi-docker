services:
  client:
    image: "sand1/multi-client-up"
    mem_limit: 128m
    hostname: client 
  server:
    image: "sand1/multi-server-up"
    mem_limit: 128m
    hostname: api
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
      - PGUSER=$PGUSER
      - PGHOST=$PGHOST
      - PGDATABASE=$PGDATABASE
      - PGPASSWORD=$PGPASSWORD
      - PGPORT=$PGPORT
  worker:
    image: "sand1/multi-worker-up"
    mem_limit: 128m
    hostname: worker
    environment:
      - REDIS_HOST=$REDIS_HOST
      - REDIS_PORT=$REDIS_PORT
  nginx:
    image: sand1/multi-server-up
    hostname: nginx
    mem_limit: 128m  
    ports: 
      - 80:80
